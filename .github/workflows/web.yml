name: Web CI/CD

# Vercel 已绑定仓库，会自动监听 web/ 目录变化并部署
# 此工作流用于保留 CI 验证能力

on:
  push:
    branches: [master]
    paths:
      - 'web/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Trigger Vercel Deployment
        run: |
          echo "Vercel 会自动监听 web/ 目录并部署"
          echo "此步骤仅用于验证代码可访问"
