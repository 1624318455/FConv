name: Desktop CI/CD

on:
  push:
    branches: [master]
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop.yml'
  pull_request:
    branches: [master]
    paths:
      - 'desktop/**'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
            
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        working-directory: desktop
        run: npm install
        
      - name: Run Unit Tests
        working-directory: desktop
        run: npm test
        
      - name: Build Electron App
        working-directory: desktop
        run: |
          if "${{ matrix.platform }}" == "win" then
            npm run build-win
          elseif "${{ matrix.platform }}" == "mac" then
            npm run build-mac
          else
            npm run build-linux
          endif
        shell: bash
        
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: desktop/dist/
          retention-days: 30
